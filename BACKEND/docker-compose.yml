version: '3.8'

services:
  # Настройка базы данных
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: vibe_check
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  # Настройка твоего бэкенда
  backend:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_PORT=3306

volumes:
  db_data: